<!DOCTYPE html>
<html>
<head>
    <title>AI Career Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f5f5f5;
        }

        .hero{
            padding:60px;
            text-align:center;
        }

        .card-box{
            border-radius:20px;
            padding:30px;
            background:white;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="hero">

        <h1 class="display-4">
            AI Career Assistant
        </h1>

        <p class="lead">
            Resume Screening, ATS Scoring & Career Insights
        </p>

    </div>

    <div class="card-box">

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <h4>📄 Upload Resume</h4>

            <input
                type="file"
                name="resume"
                class="form-control"
                required>

            <br>

            <h4>📋 Paste Job Description</h4>

            <textarea
                name="jd_text"
                class="form-control"
                rows="8"
                placeholder="Paste Job Description Here">
            </textarea>

            <br>

            <h4>📁 Or Upload JD File</h4>

            <input
                type="file"
                name="jd_file"
                class="form-control">

            <br>

            <button
                type="submit"
                class="btn btn-primary btn-lg w-100">

                Analyze Resume

            </button>

        </form>

    </div>

</div>

</body>
</html>
